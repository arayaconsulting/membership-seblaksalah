<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seblak Salah - Membership</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #121212; color: #fff; }
        .main-container { max-width: 450px; margin: auto; padding: 20px; }
        .card-form { background: #fff; border-radius: 25px; color: #333; overflow: hidden; border: none; }
        .form-header { background: #ff6600; padding: 30px 20px; text-align: center; color: #fff; }
        .logo-container { width: 90px; height: 90px; background: #000; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 3px solid #fff; padding: 5px; overflow: hidden; }
        .logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-submit { background: #ff6600; color: #fff; border-radius: 12px; font-weight: 800; padding: 15px; border: none; width: 100%; transition: 0.3s; }
        #voucherSection { position: fixed; left: -9999px; top: 0; }
        .voucher-box { background: #fff; width: 400px; color: #333; overflow: hidden; border-radius: 20px; }
        .v-top { background: #ff6600; color: #fff; padding: 25px; text-align: center; }
        .v-middle-wrap { position: relative; padding: 20px 30px 10px 30px; }
        .v-kode { font-size: 35px; font-weight: 800; color: #ff6600; border: 3px dashed #ff6600; padding: 10px; display: inline-block; width: 100%; background: #fff5f2; border-radius: 10px; letter-spacing: 2px; }
        .v-cut { height: 34px; background: #121212; width: 34px; border-radius: 50%; position: absolute; bottom: -17px; z-index: 10; }
        .cut-left { left: -17px; } .cut-right { right: -17px; }
        .v-bottom-wrap { padding: 25px 30px 30px 30px; text-align: center; border-top: 1px dashed #ccc; }
        .v-promo-list { text-align: left; background: #fff5f2; padding: 15px; border-radius: 10px; font-size: 13px; border: 1px solid #ffd8c4; }
        #finalImageContainer { display: none; text-align: center; }
        #finalImage { max-width: 100%; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .spinner { display: none; width: 25px; height: 25px; border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="main-container">
    <div id="formSection" class="card-form shadow-lg">
        <div class="form-header">
            <!-- LOGO UTAMA -->
            <div class="logo-container">
                <img src="https://lh3.googleusercontent.com/d/10pxYP4lO10SQxGrjLpfSr1yIatsftgkq" class="logo-img">
            </div>
            <h3 class="font-weight-bold mb-0 text-uppercase">Seblak Salah</h3>
            <p class="small mb-0">Join Member & Get Rewards!</p>
        </div>
        <div class="p-4">
            <form id="formDaftar">
                <input type="hidden" name="action" value="register">
                <div class="form-group"><label class="small font-weight-bold text-muted">NAMA LENGKAP</label><input type="text" name="nama" class="form-control" placeholder="Contoh: Ahmad Subarjo" required></div>
                <div class="form-group"><label class="small font-weight-bold text-muted">WHATSAPP</label><input type="tel" name="hp" class="form-control" placeholder="08xxxxxxxx" required></div>
                <div class="form-group"><label class="small font-weight-bold text-muted">TANGGAL LAHIR</label><input type="date" name="tgl_lahir" class="form-control" required></div>
                <div class="form-group"><label class="small font-weight-bold text-muted">PEKERJAAN</label><input type="text" name="pekerjaan" class="form-control" placeholder="Contoh: Mahasiswa / Karyawan" required></div>
                <button type="submit" id="btnSubmit" class="btn-submit mt-3 shadow">
                    <span id="btnText">DAFTAR & AMBIL HADIAH</span>
                    <div id="spinner" class="spinner"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- MENTAHAN VOUCHER UNTUK CAPTURE -->
    <div id="voucherSection">
        <div id="captureArea" class="voucher-box">
            <div class="v-top">
                <!-- LOGO DI VOUCHER -->
                <div class="logo-container" style="width:60px; height:60px; margin-bottom:5px; border:2px solid #fff;">
                    <img src="https://lh3.googleusercontent.com/d/10pxYP4lO10SQxGrjLpfSr1yIatsftgkq" class="logo-img">
                </div>
                <h6 class="font-weight-bold mb-0">MEMBERSHIP VOUCHER</h6>
                <p style="font-size: 10px; margin:0;">Seblak Salah Lamongan</p>
            </div>
            <div class="v-middle-wrap text-center">
                <p class="mb-1 small">Halo, <b id="resNama"></b>!</p>
                <div class="v-kode" id="resKode"></div>
                <div class="v-cut cut-left"></div><div class="v-cut cut-right"></div>
            </div>
            <div class="v-bottom-wrap">
                <div class="v-promo-list text-center">
                    <h6 class="font-weight-bold text-danger mb-1">🎁 HADIAH PENDAFTARAN:</h6>
                    <p class="mb-0 font-weight-bold" style="font-size: 16px;">GRATIS 2 PORSI DUMPLING</p>
                </div>
            </div>
        </div>
    </div>

    <!-- HASIL GAMBAR AKHIR -->
    <div id="finalImageContainer">
        <h5 class="text-center font-weight-bold text-success mb-3">SELAMAT DATANG! ✅</h5>
        <img id="finalImage">
        <p class="text-center mt-3 small text-white-50">Simpan gambar voucher ini dan tunjukkan ke kasir.</p>
        <button onclick="location.reload()" class="btn btn-sm btn-outline-light mt-2">Daftar Member Lain</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxYWWjEPsnPRtOdlUUJJSvcwAG91hTq2t6VXay6hi6wuSlOH8FoGEYDppb8_OCsnOvQ/exec';
    
    document.getElementById('formDaftar').addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('btnText').style.display = 'none';
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('btnSubmit').disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
        .then(res => res.json())
        .then(res => {
            document.getElementById('resNama').innerText = res.nama.toUpperCase();
            document.getElementById('resKode').innerText = res.kode;
            document.getElementById('formSection').style.display = 'none';
            
            setTimeout(() => {
                html2canvas(document.getElementById('captureArea'), { 
                    scale: 3, 
                    useCORS: true,
                    allowTaint: false 
                }).then(canvas => {
                    document.getElementById('finalImage').src = canvas.toDataURL("image/png");
                    document.getElementById('finalImageContainer').style.display = 'block';
                    window.scrollTo(0,0);
                });
            }, 600);
        })
        .catch(error => {
            alert('Terjadi kesalahan, coba lagi nanti!');
            document.getElementById('btnText').style.display = 'block';
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
        });
    });
</script>
</body>
</html>
