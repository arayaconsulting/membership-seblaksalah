<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir - Seblak Salah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #121212; color: #fff; padding-bottom: 50px; }
        .main-container { max-width: 500px; margin: auto; padding: 15px; }
        .logo-wrap { width: 90px; height: 90px; background: #000; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 3px solid #ff6600; overflow: hidden; padding: 5px; }
        .logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .nav-pills { background: #222; border-radius: 15px; padding: 5px; margin-bottom: 25px; }
        .nav-pills .nav-link { color: #fff; font-weight: 700; border-radius: 12px; font-size: 13px; }
        .nav-pills .nav-link.active { background: #ff6600 !important; }
        .card-custom { background: #fff; border-radius: 20px; color: #333; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-judes { background: #ff6600; color: #fff; border-radius: 12px; font-weight: 800; padding: 12px; border: none; width: 100%; }
        .btn-success-custom { background: #27ae60; color: #fff; border-radius: 12px; font-weight: 800; padding: 12px; border: none; width: 100%; }
        #resultPoin, #resultVoucher { display: none; border-radius: 15px; }
        .reminder-box { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .badge-notif { background: #ff6600; font-size: 10px; padding: 4px 8px; border-radius: 5px; color: #fff; }
    </style>
</head>
<body>
<div class="main-container text-center">
    <div class="logo-wrap shadow mt-3"><img src="https://lh3.googleusercontent.com/d/19THn9yAHSTHluA3t3ybClJWASbG0Blhx" class="logo-img"></div>
    <h4 class="font-weight-bold mb-0 text-uppercase">Seblak Salah</h4>
    <p class="small text-white-50 mb-4">Kasir & CRM Panel</p>
    
    <ul class="nav nav-pills nav-fill shadow-sm" id="pills-tab" role="tablist">
        <li class="nav-item"><a class="nav-link active" data-toggle="pill" href="#tab-poin">INPUT POIN</a></li>
        <li class="nav-item"><a class="nav-link" data-toggle="pill" href="#tab-voucher">CEK MEMBER</a></li>
    </ul>

    <div class="tab-content mt-4">
        <div class="tab-pane fade show active" id="tab-poin">
            <div class="card-custom p-4 text-left">
                <form id="formPoin">
                    <input type="hidden" name="action" value="updateTransaksi">
                    <div class="form-group"><label class="small font-weight-bold text-muted">WA MEMBER</label><input type="tel" name="hp" class="form-control" placeholder="08xxxxxxxx" required></div>
                    <div class="form-group"><label class="small font-weight-bold text-muted">TOTAL BELANJA (RP)</label><input type="number" name="nominal" class="form-control" placeholder="Contoh: 50000" required></div>
                    <button type="submit" class="btn-success-custom shadow">SIMPAN POIN</button>
                </form>
                <div id="resultPoin" class="mt-3 alert alert-success text-center text-dark">
                    <h6 class="font-weight-bold mb-1" id="resPoinNama"></h6>
                    <h4 class="font-weight-bold" id="resPoinTotal"></h4>
                    <a id="btnWA" href="#" target="_blank" class="btn btn-dark btn-sm btn-block mt-2 font-weight-bold text-white shadow">KIRIM UPDATE KE WA</a>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="tab-voucher">
            <div class="card-custom p-4 text-center">
                <form id="formVoucher">
                    <input type="hidden" name="action" value="claimVoucher">
                    <div class="form-group"><label class="small font-weight-bold text-muted">KODE MEMBER / VOUCHER</label><input type="text" name="kode_voucher" class="form-control text-center font-weight-bold text-danger" style="font-size: 24px;" placeholder="SS-XXXX" required></div>
                    <button type="submit" class="btn-judes shadow">CEK DATA MEMBER</button>
                </form>
                <div id="resultVoucher" class="mt-3 p-3 border shadow-sm text-dark">
                    <h5 class="font-weight-bold mb-1" id="resVStatus"></h5>
                    <div class="text-left small mt-2">
                        <div>Nama: <b id="resVNama"></b></div>
                        <div>Saldo Poin: <b id="resVPoin"></b></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <h6 class="mt-5 font-weight-bold text-warning text-uppercase" style="letter-spacing: 1px;">🔔 Pengingat Sapa Pelanggan</h6>
    <div id="reminderList" class="mt-3 text-left">
        <div class="text-center text-white-50 py-3" id="loadRem">Mengecek data...</div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxYWWjEPsnPRtOdlUUJJSvcwAG91hTq2t6VXay6hi6wuSlOH8FoGEYDppb8_OCsnOvQ/exec';
    
    document.getElementById('formPoin').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        btn.innerText = "Memproses..."; btn.disabled = true;
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                document.getElementById('resultPoin').style.display = 'block';
                document.getElementById('resPoinNama').innerText = res.nama;
                document.getElementById('resPoinTotal').innerText = res.totalPoin + " POIN";
                document.getElementById('btnWA').href = "https://wa.me/" + res.wa + "?text=" + encodeURIComponent(res.pesan);
            } else { alert(res.message); }
            btn.innerText = "SIMPAN POIN"; btn.disabled = false;
        });
    });

    document.getElementById('formVoucher').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
        .then(res => res.json())
        .then(res => {
            const div = document.getElementById('resultVoucher');
            div.style.display = 'block';
            if(res.success) {
                div.className = "mt-3 p-3 alert alert-success text-dark shadow-sm";
                document.getElementById('resVStatus').innerText = "DATA DITEMUKAN ✅";
                document.getElementById('resVNama').innerText = res.nama;
                document.getElementById('resVPoin').innerText = res.poin + " Poin";
            } else {
                div.className = "mt-3 p-3 alert alert-danger text-dark shadow-sm";
                document.getElementById('resVStatus').innerText = "TIDAK DITEMUKAN ❌";
            }
        });
    });

    window.onload = () => {
        fetch(scriptURL + "?action=getReminders").then(res => res.json()).then(data => {
            const list = document.getElementById('reminderList');
            document.getElementById('loadRem').remove();
            if(data.length === 0) { list.innerHTML = "<p class='text-center small text-white-50'>Tidak ada agenda sapa hari ini.</p>"; return; }
            data.forEach(item => {
                list.innerHTML += `<div class="reminder-box d-flex justify-content-between align-items-center"><div><span class="badge-notif">${item.tipe}</span><div class="font-weight-bold mt-1 text-white">${item.nama}</div></div><a href="https://wa.me/${item.wa}?text=${encodeURIComponent(item.pesan)}" target="_blank" class="btn btn-sm btn-primary">SAPA WA</a></div>`;
            });
        });
    };
</script>
</body>
</html>
