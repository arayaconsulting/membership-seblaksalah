<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir - Seblak Salah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #121212; color: #fff; padding-bottom: 50px; }
        .main-container { max-width: 500px; margin: auto; padding: 15px; }
        .logo-wrap { width: 90px; height: 90px; background: #000; border-radius: 50%; margin: 20px auto 15px; display: flex; align-items: center; justify-content: center; border: 3px solid #ff6600; overflow: hidden; padding: 5px; box-shadow: 0 0 20px rgba(255, 102, 0, 0.3); }
        .logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* Tab Navigation */
        .nav-pills { background: #222; border-radius: 15px; padding: 5px; margin-bottom: 25px; border: 1px solid #333; }
        .nav-pills .nav-link { color: #fff; font-weight: 700; border-radius: 12px; font-size: 13px; transition: 0.3s; }
        .nav-pills .nav-link.active { background: #ff6600 !important; color: #fff; }
        
        /* Card Styling */
        .card-custom { background: #fff; border-radius: 20px; color: #333; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .btn-judes { background: #ff6600; color: #fff; border-radius: 12px; font-weight: 800; padding: 12px; border: none; width: 100%; }
        .btn-success-custom { background: #27ae60; color: #fff; border-radius: 12px; font-weight: 800; padding: 12px; border: none; width: 100%; }
        
        #resultPoin, #resultVoucher { display: none; border-radius: 15px; }
        
        /* Reminder Section */
        .reminder-box { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .badge-notif { background: #ff6600; font-size: 10px; padding: 4px 8px; border-radius: 5px; color: #fff; text-transform: uppercase; font-weight: 800; }
        
        .form-control { border-radius: 10px; border: 1px solid #ddd; padding: 12px; }
        label { font-size: 11px; letter-spacing: 1px; color: #666; font-weight: 800; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="main-container text-center">
    <div class="logo-wrap shadow"><img src="https://lh3.googleusercontent.com/d/10pxYP4lO10SQxGrjLpfSr1yIatsftgkq" class="logo-img"></div>
    <h4 class="font-weight-bold mb-0" style="letter-spacing: 2px;">SEBLAK SALAH</h4>
    <p class="small text-white-50 mb-4 text-uppercase">Panel Kasir & CRM</p>
    
    <ul class="nav nav-pills nav-fill shadow-sm" id="pills-tab" role="tablist">
        <li class="nav-item"><a class="nav-link active" data-toggle="pill" href="#tab-poin">INPUT POIN</a></li>
        <li class="nav-item"><a class="nav-link" data-toggle="pill" href="#tab-voucher">CEK DATA</a></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-poin">
            <div class="card-custom p-4 text-left shadow-lg">
                <form id="formPoin">
                    <input type="hidden" name="action" value="updateTransaksi">
                    <div class="form-group">
                        <label>NOMOR WA MEMBER</label>
                        <input type="tel" name="hp" class="form-control" placeholder="Contoh: 08123456xxx" required>
                    </div>
                    <div class="form-group">
                        <label>TOTAL BELANJA (RP)</label>
                        <input type="number" name="nominal" class="form-control" placeholder="Misal: 25000" required>
                    </div>
                    <button type="submit" id="btnSimpanPoin" class="btn-success-custom shadow">SIMPAN POIN</button>
                </form>
                
                <div id="resultPoin" class="mt-3 alert alert-success text-center text-dark border-0">
                    <p class="small mb-1">Poin berhasil ditambahkan!</p>
                    <h6 class="font-weight-bold mb-1" id="resPoinNama"></h6>
                    <h4 class="font-weight-bold" id="resPoinTotal"></h4>
                    <a id="btnWA" href="#" target="_blank" class="btn btn-dark btn-sm btn-block mt-2 font-weight-bold text-white shadow-sm">KIRIM UPDATE KE WA</a>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-voucher">
            <div class="card-custom p-4 text-center shadow-lg">
                <form id="formVoucher">
                    <input type="hidden" name="action" value="claimVoucher">
                    <div class="form-group">
                        <label>KODE MEMBER / VOUCHER</label>
                        <input type="text" name="kode_voucher" class="form-control text-center font-weight-bold text-danger" style="font-size: 24px; letter-spacing: 2px;" placeholder="SS-XXXX" required>
                    </div>
                    <button type="submit" id="btnCekMember" class="btn-judes shadow">CEK STATUS MEMBER</button>
                </form>
                
                <div id="resultVoucher" class="mt-3 p-3 border-0 shadow-sm text-dark">
                    <h5 class="font-weight-bold mb-1" id="resVStatus"></h5>
                    <hr>
                    <div class="text-left small">
                        <div class="d-flex justify-content-between"><span>Nama:</span><b id="resVNama">-</b></div>
                        <div class="d-flex justify-content-between"><span>Saldo Poin:</span><b id="resVPoin">-</b></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-5 mb-3 d-flex align-items-center justify-content-center">
        <div style="flex:1; height:1px; background:#333;"></div>
        <h6 class="mx-3 font-weight-bold text-warning mb-0" style="letter-spacing: 1px;">🔔 AGENDA SAPA HARI INI</h6>
        <div style="flex:1; height:1px; background:#333;"></div>
    </div>
    
    <div id="reminderList" class="text-left">
        <p class="text-center text-white-50 small py-4" id="loadingMsg">Mengecek agenda sapa...</p>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxYWWjEPsnPRtOdlUUJJSvcwAG91hTq2t6VXay6hi6wuSlOH8FoGEYDppb8_OCsnOvQ/exec';
    
    // Logic Simpan Poin
    document.getElementById('formPoin').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSimpanPoin');
        btn.innerText = "Memproses..."; btn.disabled = true;
        
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                document.getElementById('resultPoin').style.display = 'block';
                document.getElementById('resPoinNama').innerText = res.nama;
                document.getElementById('resPoinTotal').innerText = res.totalPoin + " POIN";
                document.getElementById('btnWA').href = "https://wa.me/" + res.wa + "?text=" + encodeURIComponent(res.pesan);
                this.reset();
            } else { 
                alert(res.message); 
            }
            btn.innerText = "SIMPAN POIN"; btn.disabled = false;
        });
    });

    // Logic Cek Member
    document.getElementById('formVoucher').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnCekMember');
        btn.innerText = "Mengecek..."; btn.disabled = true;
        
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
        .then(res => res.json())
        .then(res => {
            const div = document.getElementById('resultVoucher');
            div.style.display = 'block';
            if(res.success) {
                div.className = "mt-3 p-3 alert alert-success text-dark border-0 shadow-sm";
                document.getElementById('resVStatus').innerText = "MEMBER AKTIF ✅";
                document.getElementById('resVNama').innerText = res.nama;
                document.getElementById('resVPoin').innerText = res.poin + " Poin";
            } else {
                div.className = "mt-3 p-3 alert alert-danger text-dark border-0 shadow-sm";
                document.getElementById('resVStatus').innerText = "TIDAK DITEMUKAN ❌";
            }
            btn.innerText = "CEK STATUS MEMBER"; btn.disabled = false;
        });
    });

    // Logic Load Reminder Otomatis
    window.onload = () => {
        fetch(scriptURL + "?action=getReminders")
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('reminderList');
            document.getElementById('loadingMsg').style.display = 'none';
            
            if(data.length === 0) {
                list.innerHTML = "<p class='text-center text-white-50 small py-4'>Tidak ada agenda sapa hari ini.</p>";
                return;
            }
            
            data.forEach(item => {
                list.innerHTML += `
                <div class="reminder-box d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge-notif">${item.tipe}</span>
                        <div class="font-weight-bold mt-1 text-white">${item.nama}</div>
                    </div>
                    <a href="https://wa.me/${item.wa}?text=${encodeURIComponent(item.pesan)}" target="_blank" class="btn btn-sm btn-primary" style="font-weight:700;">SAPA WA</a>
                </div>`;
            });
        });
    };
</script>
</body>
</html>
